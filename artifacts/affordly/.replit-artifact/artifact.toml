kind = "web"
previewPath = "/"
title = "Affordly AI"
version = "1.0.0"
id = "artifacts/affordly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20343

[services.development]
run = "pnpm --filter @workspace/affordly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/affordly", "run", "build" ]
publicDir = "artifacts/affordly/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20343"
BASE_PATH = "/"
